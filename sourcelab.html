<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SourceLab — Client & Operations Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF8F4;
  --surface: #FFFFFF;
  --surface-2: #F4F1EA;
  --surface-3: #EDE8DE;
  --ink: #1A1917;
  --ink-2: #57534E;
  --ink-3: #8A847C;
  --ink-4: #B8B1A4;
  --border: #E8E3D7;
  --border-strong: #D6CFBE;
  --accent: #B8410C;
  --accent-soft: #FCEEE3;
  --blue: #1D4ED8;     --blue-bg: #EAEFFB;
  --amber: #92400E;    --amber-bg: #FBEFD4;
  --purple: #6D28D9;   --purple-bg: #F1E9FB;
  --green: #14532D;    --green-bg: #DCEFE0;
  --red: #991B1B;      --red-bg: #FBE5E2;
  --shadow-sm: 0 1px 2px rgba(26,25,23,0.04);
  --shadow-md: 0 4px 16px rgba(26,25,23,0.06), 0 1px 3px rgba(26,25,23,0.04);
  --shadow-lg: 0 16px 48px rgba(26,25,23,0.08), 0 2px 8px rgba(26,25,23,0.05);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
  font-family: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "cv11";
}
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, textarea, select { font-family: inherit; font-size: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
.mono { font-family: 'Geist Mono', ui-monospace, monospace; font-feature-settings: normal; }
.serif { font-family: 'Fraunces', Georgia, serif; font-style: italic; font-weight: 400; }

/* ─────── shell ─────── */
#app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
.shell { display: flex; flex: 1; min-height: 0; overflow: hidden; }
.main {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}
.main-inner { max-width: 1240px; margin: 0 auto; padding: 32px 40px 80px; }
/* sidebar already fills shell height due to flex; ensure it doesn't scroll away */
.sidebar { overflow-y: auto; }

/* ─────── header ─────── */
.header {
  height: 60px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 24px;
  gap: 24px;
  flex-shrink: 0;
  position: sticky; top: 0; z-index: 50;
}
.logo {
  display: flex; align-items: center; gap: 10px;
  font-weight: 600; font-size: 15px;
  letter-spacing: -0.01em;
}
.logo-mark {
  width: 26px; height: 26px;
  background: var(--ink); color: var(--bg);
  display: grid; place-items: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 16px;
  font-weight: 400;
  border-radius: 2px;
}
.logo-name { letter-spacing: -0.01em; }
.logo-name b { font-weight: 600; }
.logo-name span { color: var(--ink-3); font-weight: 400; }

.role-switcher {
  display: flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 3px;
  position: relative;
}
.role-switcher button {
  padding: 6px 18px;
  font-size: 12.5px;
  font-weight: 500;
  color: var(--ink-3);
  border-radius: 999px;
  display: flex; align-items: center; gap: 7px;
  transition: color .2s, background .2s;
  letter-spacing: 0.01em;
}
.role-switcher button.active {
  background: var(--ink);
  color: var(--bg);
}
.role-switcher .dot {
  width: 5px; height: 5px; border-radius: 50%; background: currentColor;
  opacity: 0.6;
}
.role-switcher .active .dot { opacity: 1; }

.header-spacer { flex: 1; }
.header-meta {
  display: flex; align-items: center; gap: 22px;
  font-size: 12px; color: var(--ink-3);
}
.header-meta .pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 11px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--ink-2);
}
.avatar {
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--surface-3);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink);
}

/* ─────── sidebar ─────── */
.sidebar {
  width: 240px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  flex-shrink: 0;
  padding: 20px 12px;
  overflow-y: auto;
  transition: width .2s ease;
  display: flex; flex-direction: column;
}
.sidebar.collapsed {
  width: 48px;
  padding: 14px 8px;
  overflow: hidden;
}
.sidebar.collapsed .side-section,
.sidebar.collapsed .side-cta { display: none; }
.sidebar-collapse-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%;
  padding: 7px;
  border-radius: 6px;
  font-size: 13px;
  color: var(--ink-3);
  background: none; border: none; cursor: pointer;
  margin-bottom: 8px;
  transition: background .15s, color .15s;
  flex-shrink: 0;
}
.sidebar-collapse-btn:hover { background: var(--surface-2); color: var(--ink); }
.side-section + .side-section { margin-top: 22px; }
.side-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-4);
  padding: 0 12px 8px;
}
.side-item {
  display: flex; align-items: center; justify-content: space-between;
  width: 100%;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13.5px;
  color: var(--ink-2);
  transition: background .15s, color .15s;
  text-align: left;
}
.side-item:hover { background: var(--surface-2); color: var(--ink); }
.side-item.active { background: var(--ink); color: var(--bg); font-weight: 500; }
.side-item.active .badge { background: rgba(255,255,255,0.18); color: var(--bg); }
.side-item .badge {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  background: var(--surface-2);
  color: var(--ink-3);
  padding: 2px 7px;
  border-radius: 4px;
  min-width: 22px;
  text-align: center;
}
.side-item .icon {
  width: 14px; height: 14px;
  display: inline-block;
  margin-right: 9px;
  vertical-align: -2px;
  opacity: 0.7;
}
.side-cta {
  margin-top: 20px;
  padding: 14px 14px 14px;
  background: var(--accent-soft);
  border: 1px solid #F2D9C4;
  border-radius: 8px;
}
.side-cta-title {
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 16px;
  color: var(--accent);
  margin-bottom: 4px;
}
.side-cta-body { font-size: 12px; color: var(--ink-2); margin-bottom: 10px; line-height: 1.45; }
.side-cta button {
  width: 100%;
  padding: 8px 12px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 5px;
  font-size: 12px;
  font-weight: 500;
}

/* ─────── page intro ─────── */
.page-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--ink-3);
  margin-bottom: 10px;
}
.page-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 38px;
  letter-spacing: -0.02em;
  line-height: 1.1;
  color: var(--ink);
  margin-bottom: 8px;
}
.page-title em { font-style: italic; font-weight: 400; }
.page-sub {
  font-size: 14px;
  color: var(--ink-2);
  max-width: 620px;
  margin-bottom: 28px;
}

/* ─────── metric cards ─────── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 32px;
}
.metric {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 18px 16px;
  position: relative;
  overflow: hidden;
}
.metric-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 12px;
}
.metric-value {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 38px;
  line-height: 1;
  letter-spacing: -0.02em;
  color: var(--ink);
}
.metric-trend {
  font-size: 11.5px;
  color: var(--ink-3);
  margin-top: 8px;
  display: flex; gap: 6px; align-items: center;
}
.metric-trend b { color: var(--green); font-weight: 500; }
.metric-trend.warn b { color: var(--accent); }
.metric .corner-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* ─────── card / section ─────── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.card-head {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-size: 14px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.card-title-sub {
  font-size: 12px;
  color: var(--ink-3);
  margin-top: 2px;
}
.card-actions { display: flex; gap: 8px; }

/* ─────── orders table (admin) ─────── */
.orders-table { width: 100%; border-collapse: collapse; }
.orders-table th {
  text-align: left;
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  font-weight: 500;
  padding: 12px 22px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
}
.orders-table td {
  padding: 16px 22px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--ink-2);
  vertical-align: middle;
}
.orders-table tr:last-child td { border-bottom: none; }
.orders-table tr.row { cursor: pointer; transition: background .15s; }
.orders-table tr.row:hover { background: var(--surface-2); }
.orders-table .product-name {
  color: var(--ink);
  font-weight: 500;
  display: block;
  margin-bottom: 2px;
}
.orders-table .product-cat {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.orders-table .id-cell {
  font-family: 'Geist Mono', monospace;
  font-size: 11.5px;
  color: var(--ink-3);
}
.orders-table .qty {
  font-family: 'Geist Mono', monospace;
  font-size: 12px;
  color: var(--ink);
}
.orders-table .updated { color: var(--ink-3); font-size: 12px; }
.action-prompt {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 8px;
  background: var(--accent-soft);
  color: var(--accent);
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  border-radius: 4px;
  border: 1px solid #F2D9C4;
  margin-top: 4px;
}
.action-prompt::before {
  content: ''; width: 5px; height: 5px; border-radius: 50%;
  background: var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ─────── status badges ─────── */
.badge-status {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 999px;
  font-size: 11.5px;
  font-weight: 500;
  font-family: 'Geist Mono', monospace;
  letter-spacing: 0.01em;
  white-space: nowrap;
}
.badge-status::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.badge-status.blue { background: var(--blue-bg); color: var(--blue); }
.badge-status.amber { background: var(--amber-bg); color: var(--amber); }
.badge-status.purple { background: var(--purple-bg); color: var(--purple); }
.badge-status.green { background: var(--green-bg); color: var(--green); }
.badge-status.red { background: var(--red-bg); color: var(--red); }

/* ─────── client dashboard cards ─────── */
.order-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 16px;
}
.order-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 22px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.order-card:hover {
  border-color: var(--border-strong);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.order-card-head {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 12px;
  margin-bottom: 16px;
}
.order-card-id {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.order-card-name {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.015em;
  line-height: 1.15;
  color: var(--ink);
  margin-bottom: 4px;
}
.order-card-meta {
  font-size: 12px;
  color: var(--ink-3);
}
.progress-bar {
  height: 4px;
  background: var(--surface-3);
  border-radius: 999px;
  overflow: hidden;
  margin: 18px 0 10px;
}
.progress-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 999px;
  transition: width .4s;
}
.progress-meta {
  display: flex; justify-content: space-between;
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
}

/* ─────── order detail ─────── */
.detail-back {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  margin-bottom: 20px;
  padding: 6px 0;
}
.detail-back:hover { color: var(--ink); }

.detail-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  gap: 24px;
  margin-bottom: 28px;
}
.detail-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
  display: flex;
  gap: 12px;
  align-items: center;
}
.detail-eyebrow span:not(:last-child)::after {
  content: '·';
  margin-left: 12px;
  color: var(--ink-4);
}
.detail-title {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 42px;
  letter-spacing: -0.02em;
  line-height: 1.05;
  color: var(--ink);
  margin-bottom: 4px;
}
.detail-client {
  font-size: 14px;
  color: var(--ink-2);
}

/* pipeline timeline */
.pipeline {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 26px 28px 22px;
  margin-bottom: 24px;
}
.pipeline-track {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 0;
  position: relative;
}
.pipe-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  position: relative;
  text-align: center;
}
.pipe-stage::before, .pipe-stage::after {
  content: '';
  position: absolute;
  top: 9px;
  height: 1px;
  background: var(--border-strong);
  z-index: 0;
}
.pipe-stage::before { left: 0; right: 50%; }
.pipe-stage::after  { left: 50%; right: 0; }
.pipe-stage:first-child::before { display: none; }
.pipe-stage:last-child::after { display: none; }
.pipe-stage.done::before, .pipe-stage.done::after,
.pipe-stage.active::before { background: var(--ink); }
.pipe-dot {
  width: 18px; height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border-strong);
  background: var(--surface);
  position: relative;
  z-index: 1;
  display: grid; place-items: center;
}
.pipe-stage.done .pipe-dot { background: var(--ink); border-color: var(--ink); }
.pipe-stage.done .pipe-dot::after {
  content: '✓'; color: var(--bg); font-size: 10px; line-height: 1;
}
.pipe-stage.active .pipe-dot {
  background: var(--accent);
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-soft);
}
.pipe-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-3);
  margin-top: 12px;
  max-width: 80px;
  line-height: 1.3;
}
.pipe-stage.active .pipe-label { color: var(--accent); font-weight: 500; }
.pipe-stage.done .pipe-label { color: var(--ink-2); }

/* tabs */
.tabs {
  display: flex;
  gap: 4px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 24px;
}
.tab {
  padding: 12px 18px;
  font-size: 13px;
  color: var(--ink-3);
  position: relative;
  font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}
.tab:hover { color: var(--ink); }
.tab.active { color: var(--ink); }
.tab.active::after {
  content: '';
  position: absolute;
  left: 12px; right: 12px; bottom: -1px; height: 2px;
  background: var(--ink);
}
.tab .tab-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
}

/* detail content layout */
.detail-grid {
  display: grid;
  grid-template-columns: 1.6fr 1fr;
  gap: 22px;
}
.detail-col { display: flex; flex-direction: column; gap: 22px; }

/* spec list */
.spec-list { padding: 4px 0; }
.spec-row {
  display: grid;
  grid-template-columns: 160px 1fr;
  gap: 16px;
  padding: 13px 22px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}
.spec-row:last-child { border-bottom: none; }
.spec-key {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  padding-top: 1px;
}
.spec-val { color: var(--ink); }

/* action panel */
.action-panel {
  background: linear-gradient(180deg, #FFF6EE 0%, #FCEEE3 100%);
  border: 1px solid #F2D9C4;
  border-radius: 10px;
  padding: 22px;
}
.action-panel-eyebrow {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 8px;
  display: flex; align-items: center; gap: 7px;
}
.action-panel-eyebrow::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); animation: pulse 2s infinite;
}
.action-panel-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  line-height: 1.2;
  letter-spacing: -0.015em;
  color: var(--ink);
  margin-bottom: 6px;
}
.action-panel-body {
  font-size: 13px;
  color: var(--ink-2);
  margin-bottom: 16px;
  line-height: 1.5;
}
.action-panel-buttons { display: flex; gap: 8px; flex-wrap: wrap; }

/* buttons */
.btn {
  padding: 9px 16px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  transition: all .15s;
  border: 1px solid transparent;
}
.btn-primary { background: var(--ink); color: var(--bg); }
.btn-primary:hover { background: #000; }
.btn-secondary { background: var(--surface); color: var(--ink); border-color: var(--border-strong); }
.btn-secondary:hover { background: var(--surface-2); }
.btn-ghost { color: var(--ink-2); padding: 9px 12px; }
.btn-ghost:hover { background: var(--surface-2); color: var(--ink); }
.btn-danger { background: var(--surface); color: var(--red); border-color: var(--red-bg); }
.btn-danger:hover { background: var(--red-bg); }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* notes */
.note {
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
}
.note:last-child { border-bottom: none; }
.note.internal { background: #FFFAEC; }
.note-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 6px;
  font-size: 12px;
}
.note-author { font-weight: 500; color: var(--ink); }
.note-author small { color: var(--ink-3); margin-left: 6px; font-weight: 400; }
.note-internal-tag {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--amber);
  background: var(--amber-bg);
  padding: 2px 7px;
  border-radius: 4px;
}
.note-time { color: var(--ink-3); font-size: 11px; font-family: 'Geist Mono', monospace; }
.note-body { font-size: 13px; color: var(--ink-2); line-height: 1.55; }

.note-composer {
  padding: 18px;
  border-top: 1px solid var(--border);
  background: var(--surface-2);
}
.note-composer textarea {
  width: 100%;
  min-height: 70px;
  padding: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  resize: vertical;
  font-size: 13px;
  color: var(--ink);
  outline: none;
}
.note-composer textarea:focus { border-color: var(--ink); }
.note-composer-actions {
  margin-top: 10px;
  display: flex; justify-content: space-between; align-items: center;
}
.note-toggle {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--ink-3);
}
.toggle {
  width: 28px; height: 16px; border-radius: 999px;
  background: var(--border-strong);
  position: relative; cursor: pointer;
  transition: background .2s;
}
.toggle::after {
  content: ''; width: 12px; height: 12px; border-radius: 50%;
  background: white; position: absolute; top: 2px; left: 2px;
  transition: left .2s;
}
.toggle.on { background: var(--accent); }
.toggle.on::after { left: 14px; }

/* photo grid */
.photo-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  padding: 18px;
}
.photo {
  aspect-ratio: 1;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  border: 2px solid var(--border);
  cursor: pointer;
  transition: all .2s;
  background: var(--surface-3);
}
.photo:hover { transform: translateY(-1px); }
.photo.approved { border-color: var(--green); box-shadow: 0 0 0 1px var(--green); }
.photo .photo-svg {
  width: 100%; height: 100%; display: block;
}
.photo .photo-label {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(0deg, rgba(0,0,0,0.7) 0%, transparent 100%);
  color: white;
  padding: 18px 10px 8px;
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
}
.photo .photo-check {
  position: absolute; top: 8px; right: 8px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: white;
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  font-size: 12px;
  color: var(--ink-3);
}
.photo.approved .photo-check {
  background: var(--green);
  border-color: var(--green);
  color: white;
}

/* milestone feed */
.feed { padding: 6px 22px 18px; }
.feed-item {
  display: grid;
  grid-template-columns: 18px 1fr;
  gap: 14px;
  padding: 14px 0;
  position: relative;
}
.feed-item::before {
  content: '';
  position: absolute;
  left: 8px; top: 24px; bottom: -14px;
  width: 1px;
  background: var(--border-strong);
}
.feed-item:last-child::before { display: none; }
.feed-dot {
  width: 16px; height: 16px;
  border-radius: 50%;
  background: var(--surface);
  border: 2px solid var(--ink);
  margin-top: 4px;
  z-index: 1;
}
.feed-item.pending .feed-dot {
  border-color: var(--border-strong);
  background: var(--surface);
}
.feed-item.pending .feed-title { color: var(--ink-3); }
.feed-title {
  font-size: 13.5px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 2px;
}
.feed-time {
  font-size: 11px;
  font-family: 'Geist Mono', monospace;
  color: var(--ink-3);
}
.feed-body {
  font-size: 12.5px;
  color: var(--ink-2);
  margin-top: 4px;
  line-height: 1.5;
}

/* quote box */
.quote-block { padding: 22px; }
.quote-figure {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 22px;
  padding-bottom: 22px;
  border-bottom: 1px solid var(--border);
  margin-bottom: 18px;
}
.quote-fig-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  margin-bottom: 6px;
}
.quote-fig-val {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 28px;
  letter-spacing: -0.02em;
  color: var(--ink);
  line-height: 1.05;
}
.quote-fig-val small { font-size: 12px; color: var(--ink-3); font-family: 'Geist Mono', monospace; font-weight: 400; }

/* shipping label upload */
.upload-zone {
  border: 1.5px dashed var(--border-strong);
  border-radius: 8px;
  padding: 28px;
  text-align: center;
  background: var(--surface-2);
  transition: all .2s;
}
.upload-zone:hover { border-color: var(--ink); background: var(--surface-3); }
.upload-zone .upload-icon {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  display: grid; place-items: center;
  margin: 0 auto 10px;
  font-size: 16px;
  color: var(--ink-2);
}
.upload-zone .upload-text { font-size: 13px; color: var(--ink-2); margin-bottom: 4px; }
.upload-zone .upload-hint { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; }

/* shipping mini card */
.tracking-card {
  padding: 22px;
}
.tracking-row {
  display: grid;
  grid-template-columns: 120px 1fr;
  padding: 10px 0;
  font-size: 13px;
}
.tracking-row + .tracking-row { border-top: 1px solid var(--border); }
.tracking-row .k {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
}
.tracking-row .v { color: var(--ink); }

/* INTAKE FLOW */
.intake-shell {
  max-width: 760px;
  margin: 0 auto;
}
.intake-progress {
  display: flex; gap: 8px; margin-bottom: 32px;
}
.intake-step {
  flex: 1;
  height: 3px;
  background: var(--surface-3);
  border-radius: 999px;
  position: relative;
  overflow: hidden;
}
.intake-step.done { background: var(--ink); }
.intake-step.active::after {
  content: '';
  position: absolute; inset: 0;
  background: var(--ink);
  width: 60%;
}

.dropzone {
  border: 2px dashed var(--border-strong);
  border-radius: 14px;
  padding: 56px 28px;
  text-align: center;
  background: var(--surface);
  transition: all .2s;
}
.dropzone:hover { border-color: var(--ink); background: var(--surface-2); }
.dropzone-icon {
  width: 56px; height: 56px;
  margin: 0 auto 16px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 14px;
  display: grid; place-items: center;
  font-size: 22px;
}
.dropzone-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin-bottom: 6px;
}
.dropzone-sub {
  font-size: 13px;
  color: var(--ink-3);
  margin-bottom: 20px;
}
.file-types {
  display: flex; flex-wrap: wrap; justify-content: center; gap: 6px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.file-type-pill {
  padding: 3px 9px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
}

.intake-files {
  display: flex; flex-direction: column; gap: 8px;
  margin: 22px 0 8px;
}
.intake-file {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
}
.intake-file-icon {
  width: 36px; height: 36px;
  border-radius: 6px;
  background: var(--surface-2);
  display: grid; place-items: center;
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-2);
  border: 1px solid var(--border);
}
.intake-file-meta { flex: 1; }
.intake-file-name { font-size: 13px; font-weight: 500; color: var(--ink); }
.intake-file-size { font-size: 11px; color: var(--ink-3); font-family: 'Geist Mono', monospace; }
.intake-file-status {
  display: flex; align-items: center; gap: 6px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--green);
}
.intake-file-status::before {
  content: '✓'; width: 14px; height: 14px;
  background: var(--green-bg);
  border-radius: 50%;
  display: grid; place-items: center;
  font-size: 9px;
}

/* extracted fields */
.fields-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.field-cell {
  padding: 14px 16px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  position: relative;
}
.field-cell.high { border-left: 3px solid var(--green); }
.field-cell.amber { border-left: 3px solid var(--amber); background: #FFFAEC; }
.field-cell.low { border-left: 3px solid var(--red); background: #FFF6F4; }
.field-key {
  font-family: 'Geist Mono', monospace;
  font-size: 9.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  margin-bottom: 4px;
  display: flex; justify-content: space-between;
}
.field-val { font-size: 13px; color: var(--ink); font-weight: 500; }
.field-val.empty { color: var(--ink-4); font-style: italic; font-weight: 400; }
.field-conf {
  font-family: 'Geist Mono', monospace;
  font-size: 9px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.field-conf.high { color: var(--green); }
.field-conf.amber { color: var(--amber); }
.field-conf.low { color: var(--red); }

/* chat */
.chat {
  display: flex; flex-direction: column; gap: 12px;
  padding: 4px 0 14px;
}
.chat-msg {
  max-width: 85%;
  padding: 12px 16px;
  border-radius: 14px;
  font-size: 13.5px;
  line-height: 1.5;
}
.chat-msg.ai {
  background: var(--surface);
  border: 1px solid var(--border);
  border-bottom-left-radius: 4px;
}
.chat-msg.user {
  background: var(--ink);
  color: var(--bg);
  align-self: flex-end;
  border-bottom-right-radius: 4px;
}
.quick-replies {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-top: 4px;
}
.qr {
  padding: 7px 13px;
  background: var(--surface);
  border: 1px solid var(--border-strong);
  border-radius: 999px;
  font-size: 12px;
  color: var(--ink);
  cursor: pointer;
  transition: all .15s;
}
.qr:hover { background: var(--ink); color: var(--bg); border-color: var(--ink); }
.chat-input {
  display: flex; gap: 8px;
  padding: 14px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
}
.chat-input input {
  flex: 1;
  border: none;
  background: none;
  outline: none;
  padding: 6px 4px;
}
.chat-input button {
  padding: 6px 14px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
}

/* ─────── misc ─────── */
.empty-state {
  padding: 60px 20px;
  text-align: center;
  color: var(--ink-3);
}
.divider { height: 1px; background: var(--border); margin: 20px 0; }
.row-flex { display: flex; align-items: center; gap: 8px; }
.section-gap > * + * { margin-top: 22px; }

/* footer ribbon */
.context-ribbon {
  background: linear-gradient(180deg, #FFF6EE 0%, #FAF8F4 100%);
  border-bottom: 1px solid var(--border);
  padding: 8px 24px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  color: var(--ink-2);
  display: flex;
  align-items: center;
  gap: 14px;
}
.context-ribbon b { color: var(--accent); font-weight: 500; }
.context-ribbon-dot {
  width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
}

/* ─────── product thumbnail ─────── */
.product-thumb {
  width: 44px; height: 44px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 7px;
  display: grid; place-items: center;
  flex-shrink: 0;
  overflow: hidden;
}
.product-thumb svg { width: 30px; height: 30px; }

/* ─────── inline progress (table rows) ─────── */
.mini-progress {
  height: 3px;
  background: var(--surface-3);
  border-radius: 999px;
  overflow: hidden;
  width: 120px;
  margin-bottom: 4px;
}
.mini-progress-fill {
  height: 100%;
  background: var(--ink);
  border-radius: 999px;
}

/* ─────── clients table ─────── */
.clients-table { width: 100%; border-collapse: collapse; }
.clients-table th {
  text-align: left;
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--ink-3);
  font-weight: 500;
  padding: 12px 20px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.clients-table td {
  padding: 15px 20px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--ink-2);
  vertical-align: middle;
}
.clients-table tr:last-child td { border-bottom: none; }
.clients-table tr.row { cursor: pointer; transition: background .15s; }
.clients-table tr.row:hover { background: var(--surface-2); }
.client-name { font-weight: 600; color: var(--ink); font-size: 13.5px; }
.client-location { font-size: 11.5px; color: var(--ink-3); margin-top: 1px; }
.client-contact-name { font-weight: 500; color: var(--ink); }
.client-contact-detail { font-size: 11.5px; color: var(--ink-3); font-family: 'Geist Mono', monospace; margin-top: 1px; }
.clients-table .num-cell {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  color: var(--ink);
  font-weight: 500;
}
.clients-table .revenue-cell {
  font-family: 'Fraunces', serif;
  font-weight: 300;
  font-size: 17px;
  color: var(--ink);
  letter-spacing: -0.01em;
}

/* ─────── modal ─────── */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(26,25,23,0.45);
  display: grid; place-items: center;
  z-index: 200;
  padding: 24px;
  backdrop-filter: blur(2px);
}
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  width: 520px;
  max-width: 100%;
  box-shadow: var(--shadow-lg);
  animation: modal-in .18s ease;
}
@keyframes modal-in {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-head {
  display: flex; align-items: flex-start; justify-content: space-between;
  padding: 24px 24px 0;
  margin-bottom: 20px;
}
.modal-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 22px;
  letter-spacing: -0.015em;
  color: var(--ink);
}
.modal-sub { font-size: 12.5px; color: var(--ink-3); margin-top: 3px; }
.modal-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 14px;
  color: var(--ink-3);
  flex-shrink: 0;
  margin-left: 16px;
  transition: background .15s, color .15s;
}
.modal-close:hover { background: var(--surface-3); color: var(--ink); }
.modal-body { padding: 0 24px 24px; display: flex; flex-direction: column; gap: 14px; }
.modal-divider { height: 1px; background: var(--border); margin: 2px 0; }
.form-row { display: grid; gap: 10px; }
.form-row.two { grid-template-columns: 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: 5px; }
.form-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--ink-3);
}
.form-input {
  padding: 9px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--surface);
  font-size: 13px;
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
}
.form-input:focus {
  border-color: var(--ink);
  box-shadow: 0 0 0 3px rgba(26,25,23,0.07);
}
.modal-footer {
  display: flex; justify-content: flex-end; gap: 8px;
  padding: 16px 24px;
  border-top: 1px solid var(--border);
}

/* ─────── workspace active item ─────── */
.side-item.workspace-active { background: var(--ink); color: var(--bg); font-weight: 500; }
.side-item.workspace-active .badge { background: rgba(255,255,255,0.18); color: var(--bg); }

/* ─────── supplier table ─────── */
.supplier-types { display: flex; flex-wrap: wrap; gap: 4px; }
.type-pill {
  padding: 2px 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  white-space: nowrap;
}

/* ─────── supplier drawer ─────── */
.drawer-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(26,25,23,0.22);
  z-index: 44;
  backdrop-filter: blur(1px);
}
.supplier-drawer {
  position: fixed;
  top: 0; right: 0; bottom: 0;
  width: 500px;
  max-width: 100vw;
  background: var(--surface);
  border-left: 1px solid var(--border);
  overflow-y: auto;
  z-index: 45;
  box-shadow: -8px 0 32px rgba(26,25,23,0.06);
  display: flex;
  flex-direction: column;
  animation: drawer-in .22s cubic-bezier(0.4,0,0.2,1);
}
@keyframes drawer-in {
  from { transform: translateX(60px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}
.drawer-head {
  position: sticky; top: 0;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 18px 22px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
  z-index: 2;
  flex-shrink: 0;
}
.drawer-title {
  font-family: 'Fraunces', serif;
  font-weight: 400;
  font-size: 20px;
  letter-spacing: -0.015em;
  color: var(--ink);
  line-height: 1.2;
}
.drawer-subtitle {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  color: var(--ink-3);
  margin-top: 2px;
}
.drawer-head-actions { display: flex; gap: 6px; flex-shrink: 0; }
.drawer-close {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 13px;
  color: var(--ink-3);
  transition: background .15s, color .15s;
}
.drawer-close:hover { background: var(--surface-3); color: var(--ink); }
.drawer-section {
  border-bottom: 1px solid var(--border);
  padding: 20px 22px;
}
.drawer-section:last-child { border-bottom: none; }
.drawer-section-label {
  font-family: 'Geist Mono', monospace;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--ink-4);
  margin-bottom: 14px;
}
.drawer-meta-grid {
  display: grid;
  grid-template-columns: 130px 1fr;
  gap: 0;
}
.drawer-meta-row {
  display: contents;
}
.drawer-meta-key {
  font-family: 'Geist Mono', monospace;
  font-size: 10.5px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--ink-3);
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
}
.drawer-meta-val {
  font-size: 13px;
  color: var(--ink);
  padding: 9px 0;
  border-bottom: 1px solid var(--border);
}
.drawer-meta-row:last-child .drawer-meta-key,
.drawer-meta-row:last-child .drawer-meta-val { border-bottom: none; }
.drawer-photos {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
}
.drawer-photo {
  border-radius: 8px;
  overflow: hidden;
  aspect-ratio: 4/3;
  position: relative;
  background: var(--surface-2);
}
.drawer-photo svg { width: 100%; height: 100%; display: block; }
.drawer-photo-label {
  position: absolute;
  bottom: 0; left: 0; right: 0;

.sidecar-body {

.sc-meta-row {
  display: grid; grid-template-columns: 90px 1fr;

function svgFabric(hue, sat, label) {
  // procedural pseudo-fabric swatch SVG
  const bg = `hsl(${hue}, ${sat}%, ${72 - sat/4}%)`;
  const fg = `hsl(${hue}, ${sat}%, ${55 - sat/4}%)`;
  return `
    <svg class="photo-svg" viewBox="0 0 200 200" preserveAspectRatio="xMidYMid slice">
      <rect width="200" height="200" fill="${bg}"/>
      <g stroke="${fg}" stroke-width="0.6" opacity="0.45">
        ${Array.from({length:25}, (_,i)=>`<line x1="${i*8}" y1="0" x2="${i*8-30}" y2="200"/>`).join('')}
        ${Array.from({length:25}, (_,i)=>`<line y1="${i*8}" x1="0" y2="${i*8-30}" x2="200"/>`).join('')}
      </g>
      <circle cx="60" cy="80" r="40" fill="${fg}" opacity="0.18"/>
      <circle cx="160" cy="150" r="55" fill="${fg}" opacity="0.12"/>
      <text x="14" y="180" font-family="Geist Mono, monospace" font-size="9" fill="${fg}" opacity="0.55">${(label||'').toUpperCase()}</text>
    </svg>
  `;
}

function renderClientDashboard() {
  const orders = visibleOrders();
  const needsClient = orders.filter(o => o.needsClient);

  const cntInquiries   = orders.filter(o => ['inquiry','quoting'].includes(o.stage)).length;
  const cntDevelopment = orders.filter(o => ['sampling','sample-transit','sample-review'].includes(o.stage)).length;
  const cntProduction  = orders.filter(o => ['production','bulk-qc','bulk-shipping'].includes(o.stage)).length;

  let filtered = orders;
  const f = state.filter;
  if (f === 'inquiries')        filtered = orders.filter(o => ['inquiry','quoting'].includes(o.stage));
  else if (f === 'development') filtered = orders.filter(o => ['sampling','sample-transit','sample-review'].includes(o.stage));
  else if (f === 'orders')      filtered = orders.filter(o => ['production','bulk-qc','bulk-shipping','completed'].includes(o.stage));

  const SECTION_META = {
    inquiries:   { eyebrow: 'Inquiries & Quotes',   title: 'Your open inquiries',       sub: 'New briefs and active quotes awaiting your response.' },
    development: { eyebrow: 'Product Development',  title: 'Sampling & review',         sub: 'Orders currently in sampling, transit, or awaiting your physical sample review.' },
    orders:      { eyebrow: 'Orders',               title: 'In production & shipping',  sub: 'Orders that have entered manufacturing, QC, or are on their way to you.' },
  };

  if (f !== 'all' && SECTION_META[f]) {
    const meta = SECTION_META[f];
    return `
      <div class="page-eyebrow">Atlas & Oak · ${meta.eyebrow}</div>
      <h1 class="page-title"><em>${meta.title}</em></h1>
      <p class="page-sub">${meta.sub}</p>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
        <div style="font-size:12px;color:var(--ink-3);">${filtered.length} ${filtered.length===1?'order':'orders'}</div>
        ${f === 'inquiries' ? `<button class="btn btn-primary" data-action="goto-intake">+  Start a new inquiry</button>` : ''}
      </div>
      ${renderClientOrdersTable(filtered)}
    `;
  }

  // Dashboard (f === 'all')
  return `
    <div class="page-eyebrow">Atlas & Oak · London</div>
    <h1 class="page-title">Welcome back, <em>Maya</em>.</h1>
    <p class="page-sub">${needsClient.length > 0
      ? `${needsClient.length} ${needsClient.length===1?'order needs':'orders need'} your input today — a quote to review, sample photos to approve, and final QC waiting on sign-off.`
      : 'Everything is on track. Your team will reach out as soon as the next milestone is ready.'}</p>

    <div class="metrics" style="grid-template-columns:repeat(3,1fr);">
      <div class="metric">
        <div class="metric-label">Inquiries</div>
        <div class="metric-value">${cntInquiries}</div>
        <div class="metric-trend">inquiry + quoting stages</div>
      </div>
      <div class="metric">
        <div class="metric-label">In Product Development <span class="corner-dot"></span></div>
        <div class="metric-value">${cntDevelopment}</div>
        <div class="metric-trend warn">sampling · transit · review</div>
      </div>
      <div class="metric">
        <div class="metric-label">In Production</div>
        <div class="metric-value">${cntProduction}</div>
        <div class="metric-trend">production · QC · shipping</div>
      </div>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <div>
        <div style="font-size:14px;font-weight:600;">All orders</div>
        <div style="font-size:12px;color:var(--ink-3);margin-top:2px;">${orders.length} ${orders.length===1?'order':'orders'}</div>
      </div>
      <button class="btn btn-primary" data-action="goto-intake">+  Start a new inquiry</button>
    </div>
    ${renderClientOrdersTable(orders)}
  `;
}

/* ──────────────────────────────────────────────────────────

function defaultTabForStage(stage) {
  if (stage === 'inquiry') return 'brief';
  if (stage === 'quoting') return 'inquiry-quotes';
  if (['sampling','sample-transit','sample-review'].includes(stage)) return 'product-dev';
  return 'orders';
}

function renderOrderDetail() {
  const order = ORDERS.find(o => o.id === state.selectedOrderId);
  if (!order) return '<div class="empty-state">Order not found.</div>';
  const client = CLIENTS[order.clientId];
  const idx = stageIndex(order.stage);

  return `
    <button class="detail-back" data-action="back-to-dashboard">← Back to ${state.view==='admin'?'all orders':'your orders'}</button>

function orderTabBtn(key, label, dot) {
  return `<button class="tab ${state.orderTab===key?'active':''}" data-action="set-tab" data-tab="${key}">

function renderOrderTabContent(order) {
  switch (state.orderTab) {

/* ── product development tab ── */
function renderProductDevTab(order) {
  const isAdmin = state.view === 'admin';
  const devStages = ['sampling','sample-transit','sample-review'];
  if (!devStages.includes(order.stage)) {
    const isAhead = stageIndex(order.stage) < stageIndex('sampling');
    return '<div class="card"><div class="empty-state">' + (isAhead ? "This order hasn't entered sampling yet." : 'Product development is complete for this order.') + '</div></div>';
  }

  // ── multi-iteration sampling ──
  if (order.sampleIterations && order.sampleIterations.length > 0) {
    const iters = order.sampleIterations;
    let html = iters.map(function(iter) {
      const isCurrentIter = iter.status === 'current';
      const isDone = iter.status === 'completed';
      const approvalKey = order.id + '-v' + iter.version;
      const approvals = photoApprovals[approvalKey] || {};
      const total = iter.photos ? iter.photos.length : 0;
      const approvedCount = Object.values(approvals).filter(Boolean).length;
      const allApproved = total > 0 && approvedCount === total;

      let photoGrid = '';
      if (iter.photos && iter.photos.length > 0) {
        photoGrid = '<div class="photo-grid">' +
          iter.photos.map(function(p) {
            const approved = approvals[p.id];
            const clickAttr = (isCurrentIter && !isAdmin)
              ? ' data-action="toggle-photo" data-id="' + p.id + '" data-order="' + approvalKey + '"'
              : '';
            return '<div class="photo ' + (approved ? 'approved' : '') + '"' + clickAttr + '>' +
              svgFabric(p.hue, p.sat, p.label) +
              '<div class="photo-check">' + (approved ? '✓' : '') + '</div>' +
              '<div class="photo-label">' + p.label + '</div>' +
              '</div>';
          }).join('') +
        '</div>';
      } else {
        photoGrid = '<div class="empty-state" style="padding:20px;">Factory photos pending upload.</div>';
      }

      let changeNotesBanner = '';
      if (iter.changeNotes) {
        changeNotesBanner = '<div style="padding:12px 22px;border-top:1px solid var(--border);background:var(--amber-bg);border-radius:0 0 8px 8px;">' +
          '<div style="font-size:10.5px;font-family:\'Geist Mono\',monospace;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:4px;">Change request from client</div>' +
          '<div style="font-size:13px;color:var(--ink-2);">' + iter.changeNotes + '</div>' +
          '</div>';
      }

      let actionPanel = '';
      if (isCurrentIter && !isAdmin && total > 0) {
        if (allApproved) {
          actionPanel = '<div class="action-panel" style="margin:0 16px 16px;">' +
            '<div class="action-panel-eyebrow">Photos approved</div>' +
            '<div class="action-panel-title">Arrange sample delivery</div>' +
            '<div class="action-panel-body">All photos approved. Choose how you\'d like to receive the physical sample.</div>' +
            '<div class="action-panel-buttons">' +
              '<button class="btn btn-primary">Use my courier account</button>' +
              '<button class="btn btn-secondary">SourceLab arranges</button>' +
            '</div></div>';
        } else {
          actionPanel = '<div class="action-panel" style="margin:0 16px 16px;">' +
            '<div class="action-panel-eyebrow">Photo review</div>' +
            '<div class="action-panel-title">Approve all ' + total + ' photos to continue</div>' +
            '<div class="action-panel-body">' + (total - approvedCount) + ' photo' + (total-approvedCount===1?'':'s') + ' still need your review. Tap each photo to approve it.</div>' +
            '</div>';
        }
      }

      const statusClass = isDone ? 'amber' : isCurrentIter ? 'blue' : '';
      const statusLabel = isDone ? 'Changes requested' : isCurrentIter ? 'In review' : 'Pending';

      return '<div class="card" style="margin-bottom:20px;' + (isDone ? 'opacity:0.8;' : '') + '">' +
        '<div class="card-head">' +
          '<div>' +
            '<div class="card-title">Sample v' + iter.version + '</div>' +
            '<div class="card-title-sub">' + (isDone ? 'Changes requested · see notes below' : isCurrentIter ? 'Current iteration · awaiting approval' : 'Pending') + '</div>' +
          '</div>' +
          '<span class="badge-status ' + statusClass + '">' + statusLabel + '</span>' +
        '</div>' +
        photoGrid +
        actionPanel +
        changeNotesBanner +
      '</div>';
    }).join('');

    if (isAdmin) {
      html += '<div class="action-panel">' +
        '<div class="action-panel-eyebrow">Admin action</div>' +
        '<div class="action-panel-title">Manage sampling</div>' +
        '<div class="action-panel-body">Upload new factory sample photos or create a new iteration after client feedback.</div>' +
        '<div class="action-panel-buttons">' +
          '<button class="btn btn-secondary">+ Upload photos</button>' +
          '<button class="btn btn-primary">Add new iteration</button>' +
        '</div></div>';
    }
    return html;
  }

  // ── fallback: single sample photos ──
  if (order.stage === 'sampling' && order.samplePhotos) {
    const approvals = photoApprovals[order.id] || {};
    const approvedCount = Object.values(approvals).filter(Boolean).length;
    const total = order.samplePhotos.length;
    const allApproved = approvedCount === total;
    return '<div class="card" style="margin-bottom:20px;">' +
      '<div class="card-head">' +
        '<div><div class="card-title">Sample v1 — Factory photos</div>' +
        '<div class="card-title-sub">' + approvedCount + ' of ' + total + ' approved</div></div>' +
        (isAdmin ? '<button class="btn btn-secondary btn-sm">+ Upload photo</button>' : '') +
      '</div>' +
      '<div class="photo-grid">' +
        order.samplePhotos.map(function(p) {
          return '<div class="photo ' + (approvals[p.id]?'approved':'') + '" data-action="toggle-photo" data-id="' + p.id + '" data-order="' + order.id + '">' +
            svgFabric(p.hue, p.sat, p.label) +
            '<div class="photo-check">' + (approvals[p.id]?'✓':'') + '</div>' +
            '<div class="photo-label">' + p.label + '</div></div>';
        }).join('') +
      '</div></div>' +
      (!isAdmin ? (allApproved
        ? '<div class="action-panel"><div class="action-panel-eyebrow">All approved</div><div class="action-panel-title">Arrange sample delivery</div><div class="action-panel-body">All photos approved. Choose how you\'d like to receive the physical sample.</div><div class="action-panel-buttons"><button class="btn btn-primary">Use my courier account</button><button class="btn btn-secondary">SourceLab arranges</button></div></div>'
        : '<div class="action-panel"><div class="action-panel-eyebrow">Photo review</div><div class="action-panel-title">Approve all ' + total + ' photos to continue</div><div class="action-panel-body">' + (total-approvedCount) + ' photo' + (total-approvedCount===1?'':'s') + ' still need your review.</div></div>'
      ) : '');
  }

  if (order.stage === 'sample-transit') {
    return '<div class="card"><div class="card-head"><div class="card-title">Sample in transit</div></div>' +
      '<div class="tracking-card">' +
        (order.tracking
          ? '<div class="tracking-row"><div class="k">Courier</div><div class="v">' + order.tracking.courier + '</div></div>' +
            '<div class="tracking-row"><div class="k">Tracking</div><div class="v mono">' + order.tracking.number + '</div></div>' +
            '<div class="tracking-row"><div class="k">Picked up</div><div class="v">' + order.tracking.pickup + '</div></div>' +
            '<div class="tracking-row"><div class="k">ETA</div><div class="v">' + order.tracking.eta + '</div></div>' +
            '<div class="tracking-row"><div class="k">Destination</div><div class="v">' + order.tracking.destination + '</div></div>'
          : '<div class="tracking-row"><div class="k">Status</div><div class="v">Sample dispatched — tracking details coming shortly.</div></div>') +
      '</div></div>' +
      (!isAdmin ? '<div class="action-panel" style="margin-top:16px;"><div class="action-panel-eyebrow">Awaiting delivery</div><div class="action-panel-title">Sample on its way</div><div class="action-panel-body">Once it arrives, mark it as received to begin your review.</div><div class="action-panel-buttons"><button class="btn btn-primary">Mark as received</button></div></div>' : '');
  }

  if (order.stage === 'sample-review') {
    return isAdmin
      ? '<div class="action-panel"><div class="action-panel-eyebrow">Sample with client</div><div class="action-panel-title">Awaiting physical review</div><div class="action-panel-body">Client has the sample. They\'re evaluating handfeel and finish before deciding to approve, request changes, or reject.</div></div>'
      : '<div class="action-panel"><div class="action-panel-eyebrow">Your decision</div><div class="action-panel-title">How does the sample feel?</div><div class="action-panel-body">Approving moves your order into bulk production. Requesting changes will start a new iteration.</div><div class="action-panel-buttons"><button class="btn btn-primary">✓ Approve for production</button><button class="btn btn-secondary">Request changes</button><button class="btn btn-danger">Reject</button></div></div>';
  }
  return '';
}

/* ── orders tab ── */
function renderOrdersTab(order) {
  const isAdmin = state.view === 'admin';
  const orderStages = ['production','bulk-qc','bulk-shipping','completed'];
  if (!orderStages.includes(order.stage)) {
    return '<div class="card"><div class="empty-state">This order hasn\'t entered production yet.</div></div>';
  }

  const parts = [];

  // ── 1. Production started — pending QC ──
  if (order.stage === 'production') {
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head">' +
          '<div class="card-title">In production</div>' +
          '<div class="card-title-sub">Manufacturing underway — QC update pending</div>' +
        '</div>' +
        '<div style="padding:20px 22px;background:var(--surface-2);border-radius:0 0 10px 10px;">' +
          '<div style="font-family:\'Geist Mono\',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink-3);margin-bottom:6px;">Status</div>' +
          '<div style="font-size:14px;font-weight:500;color:var(--ink);margin-bottom:6px;">QC / supplier update pending</div>' +
          '<div style="font-size:13px;color:var(--ink-2);">Production has started. Quality control photos and a factory update will appear here once manufacturing reaches the inspection stage.</div>' +
          (isAdmin ? '<div style="margin-top:14px;"><button class="btn btn-secondary btn-sm">+ Add production update</button></div>' : '') +
        '</div>' +
      '</div>'
    );
  }

  // ── 2. QC photos ──
  if (order.stage === 'bulk-qc' && order.qcPhotos) {
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head">' +
          '<div>' +
            '<div class="card-title">Quality control photos</div>' +
            '<div class="card-title-sub">Bulk order · ' + (isAdmin ? 'shared with client' : 'ready for your sign-off') + '</div>' +
          '</div>' +
          (isAdmin ? '<button class="btn btn-secondary btn-sm">+ Add photo</button>' : '') +
        '</div>' +
        '<div class="photo-grid">' +
          order.qcPhotos.map(function(p) {
            return '<div class="photo">' + svgFabric(p.hue, p.sat, p.label) + '<div class="photo-label">' + p.label + '</div></div>';
          }).join('') +
        '</div>' +
        (!isAdmin
          ? '<div style="border-top:1px solid var(--border);padding:16px 22px;">' +
              '<div style="font-size:12px;color:var(--ink-2);margin-bottom:12px;">Review all photos carefully. Approving will move to the deposit payment step.</div>' +
              '<div style="display:flex;gap:8px;">' +
                '<button class="btn btn-primary" data-action="approve-qc" data-order="' + order.id + '">✓ Approve QC</button>' +
                '<button class="btn btn-secondary">Flag an issue</button>' +
              '</div>' +
            '</div>'
          : '<div style="border-top:1px solid var(--border);padding:14px 22px;font-size:12px;color:var(--ink-3);">Awaiting client approval.</div>') +
      '</div>'
    );
  }

  // ── 3. 30% deposit (after QC approved) ──
  if (order._qcApproved || order.depositStatus) {
    const depositAmount = order.depositAmount || (order.quote ? order.quote.total * 0.3 : order.quantity * order.target * 0.3);
    const depositPaid = order.depositStatus === 'paid';
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head">' +
          '<div>' +
            '<div class="card-title">Factory deposit — 30%</div>' +
            '<div class="card-title-sub">' + (depositPaid ? 'Paid · factory notified to release order' : 'Required to release order for shipment') + '</div>' +
          '</div>' +
          '<span class="badge-status ' + (depositPaid ? 'green' : 'amber') + '">' + (depositPaid ? 'Paid' : 'Pending') + '</span>' +
        '</div>' +
        '<div class="tracking-card">' +
          '<div class="tracking-row"><div class="k">Amount due</div><div class="v" style="font-weight:600;">' + fmtUSD(depositAmount) + '</div></div>' +
          '<div class="tracking-row"><div class="k">Purpose</div><div class="v">30% deposit to confirm bulk production order</div></div>' +
          (depositPaid ? '<div class="tracking-row"><div class="k">Status</div><div class="v" style="color:var(--green);">✓ Paid — factory releasing for shipment</div></div>' : '') +
        '</div>' +
        (!isAdmin && !depositPaid
          ? '<div style="border-top:1px solid var(--border);padding:16px 22px;">' +
              '<button class="btn btn-primary" data-action="pay-deposit" data-order="' + order.id + '">Pay ' + fmtUSD(depositAmount) + ' deposit →</button>' +
            '</div>'
          : '') +
      '</div>'
    );
  }

  // ── 4. Pickup date + shipping label ──
  if (order.depositStatus === 'paid' || order.pickupDate || order.stage === 'bulk-shipping') {
    const labelUploaded = order.clientShippingLabel;
    const s = order.shipping;
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head">' +
          '<div>' +
            '<div class="card-title">Pickup & shipping</div>' +
            '<div class="card-title-sub">' + (labelUploaded ? 'Shipping label uploaded · ready for pickup' : 'Upload your label so the factory can schedule pickup') + '</div>' +
          '</div>' +
          '<span class="badge-status ' + (labelUploaded ? 'green' : 'blue') + '">' + (labelUploaded ? 'Ready to ship' : 'Action needed') + '</span>' +
        '</div>' +
        '<div class="tracking-card">' +
          (order.pickupDate ? '<div class="tracking-row"><div class="k">Pickup date</div><div class="v" style="font-weight:500;">' + order.pickupDate + '</div></div>' : '') +
          (s ? '<div class="tracking-row"><div class="k">Carrier</div><div class="v">' + s.carrier + '</div></div>' +
               '<div class="tracking-row"><div class="k">Origin</div><div class="v">' + s.origin + '</div></div>' +
               '<div class="tracking-row"><div class="k">Destination</div><div class="v">' + s.destination + '</div></div>' +
               '<div class="tracking-row"><div class="k">Method</div><div class="v">' + s.method + '</div></div>' : '') +
          (labelUploaded ? '<div class="tracking-row"><div class="k">Label</div><div class="v" style="color:var(--green);">✓ ' + labelUploaded.filename + ' · uploaded ' + labelUploaded.uploaded + '</div></div>' : '') +
        '</div>' +
        (!isAdmin && !labelUploaded
          ? '<div style="border-top:1px solid var(--border);padding:16px 22px;">' +
              '<div style="font-size:12px;color:var(--ink-2);margin-bottom:10px;">Upload your shipping label so the factory can arrange pickup.</div>' +
              '<button class="btn btn-primary" data-action="upload-label" data-order="' + order.id + '">+ Upload shipping label</button>' +
            '</div>'
          : '') +
      '</div>'
    );
  }

  // ── 5. In transit ──
  if (order.stage === 'bulk-shipping' && order.shipping && order.shipping.shipped) {
    const s = order.shipping;
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head">' +
          '<div class="card-title">Shipment in transit</div>' +
          '<div class="card-title-sub">Picked up ' + s.shipped + ' · ETA ' + s.eta + '</div>' +
        '</div>' +
        '<div class="tracking-card">' +
          '<div class="tracking-row"><div class="k">Carrier</div><div class="v">' + s.carrier + '</div></div>' +
          '<div class="tracking-row"><div class="k">Tracking</div><div class="v mono">' + s.tracking + '</div></div>' +
          '<div class="tracking-row"><div class="k">Shipped</div><div class="v">' + s.shipped + '</div></div>' +
          '<div class="tracking-row"><div class="k">ETA</div><div class="v">' + s.eta + '</div></div>' +
          '<div class="tracking-row"><div class="k">Destination</div><div class="v">' + s.destination + '</div></div>' +
        '</div>' +
      '</div>'
    );
  }

  // ── 6. Completed ──
  if (order.stage === 'completed' && order.completedSummary) {
    const cs = order.completedSummary;
    parts.push(
      '<div class="card" style="margin-bottom:20px;">' +
        '<div class="card-head"><div class="card-title">Order delivered</div></div>' +
        '<div class="tracking-card">' +
          '<div class="tracking-row"><div class="k">Final unit</div><div class="v">' + fmtUSD(cs.finalUnit) + '</div></div>' +
          '<div class="tracking-row"><div class="k">Final total</div><div class="v">' + fmtUSD(cs.finalTotal) + '</div></div>' +
          '<div class="tracking-row"><div class="k">Delivered</div><div class="v">' + cs.delivered + '</div></div>' +
          '<div class="tracking-row"><div class="k">Lead time</div><div class="v">' + cs.leadTotal + '</div></div>' +
        '</div>' +
      '</div>' +
      (!isAdmin
        ? '<div class="action-panel"><div class="action-panel-eyebrow">All done</div><div class="action-panel-title">What\'s next?</div><div class="action-panel-body">Delivered on schedule. Restock the same product or start something new.</div><div class="action-panel-buttons"><button class="btn btn-primary">Restock this order</button><button class="btn btn-secondary" data-action="goto-intake">Start a new product</button></div></div>'
        : '')
    );
  }

  // ── 7. Delivery notes ──
  parts.push(
    '<div class="card">' +
      '<div class="card-head">' +
        '<div class="card-title">Delivery notes</div>' +
        '<div class="card-title-sub">Report issues or add comments about this delivery</div>' +
      '</div>' +
      (order.deliveryNotes
        ? '<div style="padding:14px 22px;font-size:13px;color:var(--ink-2);">' + order.deliveryNotes + '</div>'
        : '<div class="empty-state" style="padding:20px;">No notes yet.</div>') +
      (!isAdmin
        ? '<div style="border-top:1px solid var(--border);padding:14px 22px;">' +
            '<textarea class="form-input" rows="2" placeholder="Describe any delivery issues or add a comment…" style="width:100%;margin-bottom:8px;"></textarea>' +
            '<button class="btn btn-secondary btn-sm">Add note</button>' +
          '</div>'
        : '') +
    '</div>'
  );

  return parts.join('');
}

function renderIntake() {
  return `
    <button class="detail-back" data-action="back-to-dashboard">← Back to your orders</button>
    <div class="intake-shell">
      <div class="page-eyebrow">New inquiry · Step ${state.intakeStep} of 4</div>
      <h1 class="page-title">Tell us what you&apos;re <em>making</em>.</h1>
      <p class="page-sub">Drop your tech pack, sketch, or reference photo and our AI will draft a factory-ready brief in under a minute. We&apos;ll only ask you for what we couldn&apos;t figure out on our own.</p>

      <div class="intake-progress">
        <div class="intake-step ${state.intakeStep>1?'done':state.intakeStep===1?'active':''}"></div>
        <div class="intake-step ${state.intakeStep>2?'done':state.intakeStep===2?'active':''}"></div>
        <div class="intake-step ${state.intakeStep>3?'done':state.intakeStep===3?'active':''}"></div>
        <div class="intake-step ${state.intakeStep===4?'active':''}"></div>

}

function svgFactory(hue, sat, label) {
  const bg   = `hsl(${hue},${sat}%,${78 - sat/3}%)`;
  const wall = `hsl(${hue},${sat}%,${62 - sat/3}%)`;
  const win  = `hsl(${hue},${Math.max(sat-4,0)}%,${90}%)`;
  return `
    <svg viewBox="0 0 240 180" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;display:block;">
      <rect width="240" height="180" fill="${bg}"/>
      <rect x="0"   y="80"  width="240" height="100" fill="${wall}" opacity="0.55"/>
      <rect x="20"  y="60"  width="80"  height="120" fill="${wall}" opacity="0.7" rx="1"/>
      <rect x="120" y="72"  width="100" height="108" fill="${wall}" opacity="0.65" rx="1"/>
      <rect x="28"  y="70"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="52"  y="70"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="28"  y="92"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="52"  y="92"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="130" y="82"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="156" y="82"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="182" y="82"  width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="130" y="104" width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="156" y="104" width="18"  height="14"  fill="${win}"  opacity="0.85" rx="1"/>
      <rect x="44"  y="138" width="24"  height="42"  fill="${win}"  opacity="0.5"  rx="1"/>
      <rect x="148" y="138" width="20"  height="42"  fill="${win}"  opacity="0.5"  rx="1"/>
      <text x="10" y="170" font-family="Geist Mono,monospace" font-size="8" fill="${wall}" opacity="0.6">${(label||'').toUpperCase()}</text>
    </svg>`;
}

function clientRevenue(clientId) {
  return ORDERS
    .filter(o => o.clientId === clientId)
    .reduce((sum, o) => {
      if (o.completedSummary) return sum + o.completedSummary.finalTotal;
      if (o.quote)            return sum + o.quote.total;
      return sum + (o.quantity * o.target);
    }, 0);
}

function render() {
  let main = '';
  if (state.page === 'order')          main = renderOrderDetail();
  else if (state.page === 'intake')    main = renderIntake();
  else if (state.page === 'clients')   main = renderClientsPage();
  else if (state.page === 'suppliers') main = renderSuppliersPage();
  else if (state.view === 'admin')     main = renderAdminDashboard();
  else                                 main = renderClientDashboard();

  document.getElementById('app').innerHTML = `
    ${renderHeader()}
    <div class="shell">
      ${renderSidebar()}
      <div class="main">
        <div class="main-inner">${main}</div>
      </div>
    </div>
  `;
}

/* ──────────────────────────────────────────────────────────
   EVENT DELEGATION
   ────────────────────────────────────────────────────────── */
document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-action]');
  if (!target) {
    // toggle composer toggle (no data-action)
    const tog = e.target.closest('.toggle');
    if (tog) { tog.classList.toggle('on'); }
    return;
  }
  const action = target.dataset.action;

  if (action === 'switch-view') {
    state.view = target.dataset.view;
    state.page = 'dashboard';
    state.filter = 'all';
    state.selectedOrderId = null;
    render();
  }
  else if (action === 'set-filter') {
    state.filter = target.dataset.filter;
    state.page = 'dashboard';
    state.selectedOrderId = null;
    render();
  }
  else if (action === 'open-order') {
    const o = ORDERS.find(x => x.id === target.dataset.id);
    state.selectedOrderId = target.dataset.id;
    state.page = 'order';
    state.orderTab = o ? defaultTabForStage(o.stage) : 'inquiry-quotes';
    state.orderSubState = null;
    state.sidecarOpen = true;
    state.sidecarTab = 'client';
    render();
    document.querySelector('.main').scrollTop = 0;
  }
  else if (action === 'back-to-dashboard') {
    state.page = 'dashboard';
    state.selectedOrderId = null;
    state.intakeStep = 1;
    render();
  }
  else if (action === 'set-tab') {
    state.orderTab = target.dataset.tab;
    render();
  }
  else if (action === 'goto-intake') {
    state.page = 'intake';
    state.intakeStep = 1;
    render();
  }
  else if (action === 'intake-next') {
    state.intakeStep = Math.min(4, state.intakeStep + 1);
    render();
  }
  else if (action === 'toggle-photo') {
    const id = target.dataset.id;
    const orderId = target.dataset.order;
    if (!photoApprovals[orderId]) photoApprovals[orderId] = {};
    photoApprovals[orderId][id] = !photoApprovals[orderId][id];
    render();
  }
  else if (action === 'toggle-sidebar') {
    state.sidebarOpen = !state.sidebarOpen;
    render();
  }
  else if (action === 'toggle-sidecar') {
    state.sidecarOpen = !state.sidecarOpen;
    render();
  }
  else if (action === 'set-sidecar-tab') {
    state.sidecarTab = target.dataset.tab;
    render();
  }
  else if (action === 'toggle-quote-form') {
    state.orderSubState = state.orderSubState === 'quote-form' ? null : 'quote-form';
    render();
  }
  else if (action === 'approve-qc') {
    const o = ORDERS.find(x => x.id === target.dataset.order);
    if (o) { o._qcApproved = true; o.depositStatus = 'pending'; }
    render();
  }
  else if (action === 'pay-deposit') {
    const o = ORDERS.find(x => x.id === target.dataset.order);
    if (o) { o.depositStatus = 'paid'; o.pickupDate = 'Apr 28, 2026'; }
    render();
  }
  else if (action === 'upload-label') {
    const o = ORDERS.find(x => x.id === target.dataset.order);
    if (o) o.clientShippingLabel = { filename: 'ShippingLabel_' + o.id + '.pdf', uploaded: 'just now' };
    render();
  }
  else if (action === 'toggle-question-form') {
    // questions composer is always visible; just scroll to it
    render();
  }
  else if (action === 'goto-clients') {
    state.page = 'clients';
    state.modal = null;
    render();
  }
  else if (action === 'goto-suppliers') {
    state.page = 'suppliers';
    state.modal = null;
    state.selectedSupplierId = null;
    state.supplierEditMode = false;
    render();
  }
  else if (action === 'open-supplier') {
    state.selectedSupplierId = target.dataset.id;
    state.supplierEditMode = false;
    render();
  }
  else if (action === 'close-drawer') {
    state.selectedSupplierId = null;
    state.supplierEditMode = false;
    render();
  }
  else if (action === 'edit-supplier') {
    state.supplierEditMode = true;
    render();
  }
  else if (action === 'cancel-supplier-edit') {
    state.supplierEditMode = false;
    render();
  }
  else if (action === 'save-supplier') {
    const id = target.dataset.id;
    const s = SUPPLIERS.find(x => x.id === id);
    if (s) {
      const g = (eid) => document.getElementById(eid)?.value.trim();
      s.name        = g('se-name')      || s.name;
      s.country     = g('se-country')   || s.country;
      s.city        = g('se-city')      || s.city;
      s.contact     = g('se-contact')   || s.contact;
      s.phone       = g('se-phone')     || s.phone;
      s.wechat      = g('se-wechat')    || s.wechat;
      s.email       = g('se-email')     || s.email;
      s.about       = document.getElementById('se-about')?.value.trim() || s.about;
      s.founded     = g('se-founded')   || s.founded;
      s.employees   = g('se-employees') || s.employees;
      s.factorySize = g('se-size')      || s.factorySize;
      s.moq         = parseInt(g('se-moq')) || s.moq;
      s.leadTime    = g('se-lead')      || s.leadTime;
    }
    state.supplierEditMode = false;
    render();
  }
  else if (action === 'submit-supplier') {
    const g = (eid) => document.getElementById(eid)?.value.trim();
    const name    = g('sf-name');
    const contact = g('sf-contact');
    const country = g('sf-country');
    if (!name || !contact || !country) {
      if (!name)    document.getElementById('sf-name').style.borderColor    = 'var(--red)';
      if (!contact) document.getElementById('sf-contact').style.borderColor = 'var(--red)';
      if (!country) document.getElementById('sf-country').style.borderColor = 'var(--red)';
      return;
    }
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    const types = g('sf-types') ? g('sf-types').split(',').map(t => t.trim()).filter(Boolean) : [];
    SUPPLIERS.push({
      id, name, contact, country,
      city:         g('sf-city')  || '',
      phone:        g('sf-phone') || '',
      wechat:       null,
      email:        g('sf-email') || '',
      types,
      activeProjects: 0,
      about: '',
      founded: '—', employees: '—', factorySize: '—', moq: 0, leadTime: '—',
      photos: [], products: [], catalogs: [], certifications: [],
    });
    state.modal = null;
    render();
  }
  else if (action === 'open-modal') {
    state.modal = target.dataset.modal;
    render();
  }
  else if (action === 'close-modal') {
    state.modal = null;
    render();
  }
  else if (action === 'submit-client') {
    const name    = document.getElementById('f-name')?.value.trim();
    const contact = document.getElementById('f-contact')?.value.trim();
    const city    = document.getElementById('f-city')?.value.trim();
    const country = document.getElementById('f-country')?.value.trim();
    const phone   = document.getElementById('f-phone')?.value.trim();
    const email   = document.getElementById('f-email')?.value.trim();
    if (!name || !contact) {
      document.getElementById('f-name').style.borderColor = name ? '' : 'var(--red)';
      document.getElementById('f-contact').style.borderColor = contact ? '' : 'var(--red)';
      return;
    }
    const id = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
    CLIENTS[id] = { name, contact, city, country, phone, email, suppliersEngaged: 0 };
    state.modal = null;
    render();
  }
});

render();
</script>
</body>
</html>
